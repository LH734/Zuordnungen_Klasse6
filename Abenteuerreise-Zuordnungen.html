<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Die große Abenteuerreise – Zuordnungen</title>
<style>
:root{--s1:#DC2626;--s2:#16A34A;--s3:#0284C7;--s4:#7C3AED;--s5:#0891B2;--bonus:#CA8A04;--bg:#FFF7ED;--card:#FFF;--tx:#1E293B;--txL:#64748B;--ok:#22C55E;--err:#EF4444;--warn:#F59E0B;--cur:var(--s1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
.hidden{display:none!important}
#topBar{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
#topBar .title{font-size:1.2rem;font-weight:700}
#topBar .pts{background:rgba(255,255,255,.2);padding:6px 14px;border-radius:20px;font-weight:600}
#pbo{height:6px;background:rgba(255,255,255,.3);border-radius:3px;flex:1;margin:0 16px;max-width:300px}
#pbi{height:100%;background:#FDE047;border-radius:3px;transition:width .5s;width:0%}
.scr{max-width:920px;margin:0 auto;padding:24px 16px;display:none}
.scr.active{display:block}
#startScr.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
#startScr{text-align:center;min-height:80vh}
#startScr h1{font-size:2.4rem;background:linear-gradient(135deg,#F59E0B,#EF4444,#8B5CF6,#0EA5E9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
#startScr .sub{font-size:1.1rem;color:var(--txL);margin-bottom:32px}
#nameIn{font-size:1.1rem;padding:12px 20px;border:3px solid #C7D2FE;border-radius:16px;outline:none;text-align:center;width:300px;max-width:90vw}
#nameIn:focus{border-color:#6366F1}
.startBtn{margin-top:24px;font-size:1.3rem;padding:16px 48px;border:none;border-radius:20px;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;cursor:pointer;font-weight:700;box-shadow:0 4px 16px rgba(99,102,241,.4);transition:transform .15s}
.startBtn:hover{transform:scale(1.05)}
#mapScr h2{text-align:center;font-size:1.6rem;margin-bottom:24px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:24px}
.sc{background:var(--card);border-radius:20px;padding:24px;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s;border:3px solid transparent;position:relative}
.sc:hover:not(.lk){transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.sc.lk{opacity:.5;cursor:not-allowed;filter:grayscale(.6)}
.sc.act{box-shadow:0 0 0 4px rgba(99,102,241,.15)}
.sc.done{border-color:var(--ok)}
.sc .em{font-size:2.4rem;display:block;margin-bottom:8px}
.sc .sn{font-weight:700;font-size:1.1rem;margin-bottom:4px}
.sc .sd{font-size:.85rem;color:var(--txL)}
.sc .li{position:absolute;top:12px;right:12px;font-size:1.4rem}
.sc .st{margin-top:8px;font-size:1.2rem;color:#F59E0B}
#taskScr{padding-bottom:80px}
.th{text-align:center;margin-bottom:20px}
.th .sl{display:inline-block;padding:6px 16px;border-radius:12px;color:#fff;font-weight:700;font-size:.9rem;margin-bottom:8px}
.tp{font-size:.95rem;color:var(--txL);margin-bottom:4px}
.tpb{height:8px;background:#E2E8F0;border-radius:4px;margin:8px auto;max-width:400px}
.tpf{height:100%;border-radius:4px;transition:width .4s}
.tc{background:var(--card);border-radius:20px;padding:28px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:2px solid #E2E8F0}
.tc .intro{font-size:1.05rem;margin-bottom:16px;line-height:1.6}
.tc .intro strong{color:var(--cur)}
.vt{border-collapse:collapse;margin:12px auto;font-size:1rem}
.vt th,.vt td{border:2px solid #CBD5E1;padding:10px 16px;text-align:center;min-width:55px}
.vt th{background:#F1F5F9;font-weight:700}
.vt input{width:70px;padding:6px;border:2px solid #C7D2FE;border-radius:8px;text-align:center;font-size:1rem;outline:none}
.vt input:focus{border-color:#6366F1}
.btn{display:inline-block;padding:12px 28px;border:none;border-radius:14px;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .15s}
.btn:hover{transform:scale(1.03)}
.btn:active{transform:scale(.98)}
.bp{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;box-shadow:0 3px 12px rgba(99,102,241,.3)}
.bs{background:var(--ok);color:#fff}
.bw{background:var(--warn);color:#fff}
.bst{color:#fff;box-shadow:0 3px 12px rgba(0,0,0,.15)}
.mo{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0}
.mb{flex:1 1 calc(50% - 10px);min-width:200px;padding:14px 20px;border:3px solid #E2E8F0;border-radius:16px;background:var(--card);font-size:1rem;cursor:pointer;transition:all .2s;text-align:left;font-weight:500}
.mb:hover{border-color:var(--cur);background:#F8FAFC}
.mb.ok{border-color:var(--ok);background:#F0FDF4;pointer-events:none}
.mb.no{border-color:var(--err);background:#FEF2F2}
.mb.dis{pointer-events:none;opacity:.7}
.tfb{display:flex;gap:12px;margin:12px 0}
.tf{flex:1;padding:14px;border:3px solid #E2E8F0;border-radius:16px;background:var(--card);font-size:1.1rem;font-weight:700;cursor:pointer;text-align:center;transition:all .2s}
.tf:hover{border-color:var(--cur)}
.tf.ok{border-color:var(--ok);background:#F0FDF4}
.tf.no{border-color:var(--err);background:#FEF2F2}
.fb{padding:14px 20px;border-radius:14px;margin:12px 0;font-weight:600;font-size:1rem;display:none}
.fb.s{background:#F0FDF4;color:#15803D;border:2px solid #86EFAC;display:block}
.fb.e{background:#FEF2F2;color:#B91C1C;border:2px solid #FCA5A5;display:block}
.fb.h{background:#FFFBEB;color:#92400E;border:2px solid #FCD34D;display:block}
.sol{background:#F0F9FF;border:2px solid #7DD3FC;border-radius:14px;padding:16px 20px;margin:12px 0;font-size:.95rem;line-height:1.7}
.sol .lb{font-weight:700;color:var(--s3)}
.gs{display:inline-block;padding:4px 12px;border:2px solid #C7D2FE;border-radius:8px;font-size:1rem;background:#F8FAFC;cursor:pointer;min-width:120px}
.gs.ok{border-color:var(--ok);background:#F0FDF4}
.gs.no{border-color:var(--err);background:#FEF2F2}
.ni{width:80px;padding:8px;border:2px solid #C7D2FE;border-radius:8px;text-align:center;font-size:1rem;outline:none}
.ni:focus{border-color:#6366F1}
.row{display:flex;align-items:center;gap:8px;margin:8px 0;flex-wrap:wrap}
.confetti{position:fixed;width:10px;height:10px;border-radius:50%;z-index:9999;pointer-events:none;animation:cfall 1.5s ease-out forwards}
@keyframes cfall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
.cwr{text-align:center;padding:24px;background:linear-gradient(135deg,#FEF3C7,#FDE68A);border-radius:20px;margin:20px 0;border:3px solid #F59E0B}
.cwr .frag{font-size:2rem;font-weight:900;letter-spacing:8px;color:#92400E;margin:12px 0}
.cert{background:#fff;border:4px solid #F59E0B;border-radius:24px;padding:40px;max-width:600px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.1);position:relative;overflow:hidden}
.cert::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(245,158,11,.03) 20px,rgba(245,158,11,.03) 40px);pointer-events:none}
.cert h2{font-size:1.8rem;color:#92400E;margin-bottom:8px}
.svgC{display:flex;justify-content:center;margin:16px 0}
.svgC svg{max-width:100%;height:auto}
.qbox{padding:14px;background:#F8FAFC;border-radius:12px;margin:10px 0;font-size:1.05rem;line-height:1.6}
.stepbox{background:#F1F5F9;border-radius:12px;padding:14px;margin:8px 0}
.stepbox .steplabel{font-weight:700;margin-bottom:6px;color:var(--cur)}
@media(max-width:768px){#startScr h1{font-size:1.6rem}.sg{grid-template-columns:1fr}.mb{flex:1 1 100%;min-width:unset}.tc{padding:18px}.vt th,.vt td{padding:6px 10px}}
</style>
</head>
<body>
<div id="topBar" class="hidden">
  <div class="title" id="topTitle">Die große Abenteuerreise</div>
  <div id="pbo"><div id="pbi"></div></div>
  <div class="pts" id="topPts">0 Punkte</div>
</div>
<div class="scr active" id="startScr">
  <div style="font-size:4rem;margin-bottom:16px;">🌍✈️🗺️</div>
  <h1>Die große Abenteuerreise</h1>
  <p class="sub">Zuordnungen – direkte und indirekte Proportionalität<br>Klasse 6 Gymnasium</p>
  <input type="text" id="nameIn" placeholder="Dein Name (freiwillig)">
  <button class="startBtn" onclick="startGame()">Los geht's! 🚀</button>
  <p style="margin-top:16px;font-size:.85rem;color:var(--txL);">Reise durch 5 spannende Stationen und werde zum Matheprofi!</p>
</div>
<div class="scr" id="mapScr">
  <h2 id="mapGreet">Deine Reiseroute 🗺️</h2>
  <div class="sg" id="stGrid"></div>
  <div style="text-align:center;margin-top:12px;" id="cwProg"></div>
</div>
<div class="scr" id="taskScr">
  <div class="th">
    <span class="sl" id="tsl"></span>
    <div class="tp" id="tpt"></div>
    <div class="tpb"><div class="tpf" id="tpf"></div></div>
  </div>
  <div id="tC"></div>
  <div style="text-align:center;margin-top:20px;">
    <button class="btn bp hidden" id="nxBtn" onclick="nxTask()">Weiter ➡️</button>
    <button class="btn bw hidden" id="solBtn" onclick="showSol()">Lösung zeigen 🔓</button>
    <button class="btn bp hidden" id="mapBtn" onclick="showMap()">Zurück zur Karte 🗺️</button>
  </div>
</div>
<div class="scr" id="certScr" style="text-align:center;min-height:80vh;display:none;flex-direction:column;align-items:center;justify-content:center;">
  <div class="cert" id="certC"></div>
  <button class="btn bp" style="margin-top:24px;" onclick="showMap()">Zurück zur Karte 🗺️</button>
  <button class="btn bs" style="margin-top:12px;" onclick="window.print()">Reisepass drucken 🖨️</button>
</div>
<div class="hidden" id="toOv" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;">
  <div style="background:#fff;border-radius:20px;padding:40px;text-align:center;">
    <div style="font-size:2rem;">⏳</div>
    <p style="font-size:1.1rem;margin:12px 0;">Warte kurz und denke nochmal nach...</p>
    <div style="font-size:3rem;font-weight:900;color:var(--err);margin:16px 0;" id="toCD">2:00</div>
  </div>
</div>

<script>
// === CONSTANTS ===
const CW="MATHEPROFI",CWF=["MA","TH","EP","RO","FI"];
const STN=[
  {id:1,em:"🚂",nm:"Bahnhof",ds:"Allgemeine Zuordnungen",cl:"#DC2626"},
  {id:2,em:"🚗",nm:"Autobahn",ds:"Direkt proportionale Zuordnungen",cl:"#16A34A"},
  {id:3,em:"⛵",nm:"Hafen",ds:"Indirekt proportionale Zuordnungen",cl:"#0284C7"},
  {id:4,em:"🏔️",nm:"Gebirge",ds:"Gemischt: direkt vs. indirekt",cl:"#7C3AED"},
  {id:5,em:"🏖️",nm:"Strand-Ziel",ds:"Dreisatz-Finale",cl:"#0891B2"},
  {id:6,em:"⭐",nm:"Bonus-Sprint",ds:"Alle Typen, endlos",cl:"#CA8A04"}
];
let G={name:"",pts:0,st:[
  {u:1,d:0,td:0,tt:6,p:0,mp:0},{u:0,d:0,td:0,tt:7,p:0,mp:0},
  {u:0,d:0,td:0,tt:7,p:0,mp:0},{u:0,d:0,td:0,tt:6,p:0,mp:0},
  {u:0,d:0,td:0,tt:8,p:0,mp:0},{u:0,d:0,td:0,tt:0,p:0,mp:0}
],cf:[0,0,0,0,0],cs:-1,ct:0,att:0,lat:0,ans:0};
let solFn=null;
function sv(){try{localStorage.setItem('ar_s',JSON.stringify(G))}catch(e){}}
function ld(){try{const s=localStorage.getItem('ar_s');if(s){Object.assign(G,JSON.parse(s));return 1}}catch(e){}return 0}
function $(id){return document.getElementById(id)}
function rI(a,b){return a+Math.floor(Math.random()*(b-a+1))}
function pk(a){return a[Math.floor(Math.random()*a.length)]}
function r2(n){return Math.round(n*100)/100}
function pN(s){if(!s)return NaN;return parseFloat(String(s).trim().replace(',','.'))}
function aE(a,b,t){t=t||0.01;return Math.abs(a-b)<=t+Math.abs(b)*0.005}
function showScr(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}
const SM=["Super! 🎉","Richtig! Weiter so! 🚀","Perfekt! 💪","Genau! ⭐","Toll gemacht! 🌟","Klasse! 🎊","Ausgezeichnet! 🏆","Fantastisch! 🔥"];
function rs(){return pk(SM)}
function confetti(){const c=['#EF4444','#F59E0B','#22C55E','#3B82F6','#8B5CF6','#EC4899'];for(let i=0;i<30;i++){const d=document.createElement('div');d.className='confetti';d.style.cssText=`left:${rI(5,95)}%;top:-10px;background:${pk(c)};width:${rI(6,12)}px;height:${rI(6,12)}px;border-radius:${rI(0,1)?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.5}s`;document.body.appendChild(d);setTimeout(()=>d.remove(),3000)}}
function updBar(){$('topPts').textContent=G.pts+' Punkte';let d=0,a=0;for(let i=0;i<5;i++){d+=G.st[i].td;a+=G.st[i].tt}$('pbi').style.width=(a?Math.round(d/a*100):0)+'%'}
function getStars(p,m){if(!m)return'';const r=p/m*100;return r>=90?'⭐⭐⭐':r>=75?'⭐⭐':r>=60?'⭐':'💪'}

// === GAME FLOW ===
function startGame(){
  G.name=$('nameIn').value.trim()||'';
  $('mapGreet').innerHTML=`Auf geht's${G.name?', '+G.name:''}! 🌍`;
  $('topBar').classList.remove('hidden');
  $('topTitle').textContent=G.name?G.name+'s Abenteuerreise':'Die große Abenteuerreise';
  buildMap();showScr('mapScr');updBar();sv();
}
function buildMap(){
  const g=$('stGrid');g.innerHTML='';
  STN.forEach((s,i)=>{const st=G.st[i];const c=document.createElement('div');c.className='sc';
    if(!st.u)c.classList.add('lk');if(st.d)c.classList.add('done');if(st.u&&!st.d)c.classList.add('act');
    c.style.borderColor=st.u?s.cl:'';
    c.innerHTML=`<span class="em">${s.em}</span><div class="sn" style="color:${s.cl}">Station ${s.id}: ${s.nm}</div><div class="sd">${s.ds}</div>${!st.u?'<span class="li">🔒</span>':''}${st.d?`<div class="st">${getStars(st.p,st.mp)}</div>`:''}${st.u&&!st.d&&i<5?`<div style="margin-top:8px;font-size:.85rem;color:${s.cl}">Aufgabe ${st.td+1} von ${st.tt}</div>`:''}`;
    if(st.u)c.onclick=()=>enterSt(i);g.appendChild(c);
  });
  let cw='';for(let i=0;i<5;i++){cw+=G.cf[i]?`<span style="color:#DC2626;font-weight:900;">${CWF[i]}</span>`:'<span style="color:#CBD5E1;">_ _</span>';if(i<4)cw+=' '}
  $('cwProg').innerHTML='🔑 Codewort: '+cw;
}
function showMap(){buildMap();showScr('mapScr');updBar()}
function enterSt(i){G.cs=i;G.ct=G.st[i].td;document.documentElement.style.setProperty('--cur',STN[i].cl);showScr('taskScr');loadTask()}
function loadTask(){
  window.scrollTo(0,0);const s=G.cs,t=G.ct,inf=STN[s],st=G.st[s];
  $('tsl').textContent=`${inf.em} Station ${inf.id}: ${inf.nm}`;$('tsl').style.background=inf.cl;
  if(s<5&&t>=st.tt){stComplete();return}
  $('tpt').textContent=`Aufgabe ${t+1} von ${st.tt} ${inf.em}`;
  $('tpf').style.width=(t/st.tt*100)+'%';$('tpf').style.background=inf.cl;
  $('nxBtn').classList.add('hidden');$('solBtn').classList.add('hidden');$('mapBtn').classList.add('hidden');
  G.att=0;G.ans=0;solFn=null;
  [genS1,genS2,genS3,genS4,genS5,genBonus][s](t);updBar();
}
function taskOk(){if(G.ans)return;G.ans=1;const a=G.att===0?3:G.att===1?2:1;G.pts+=a;G.st[G.cs].p+=a;G.st[G.cs].mp+=3;$('nxBtn').classList.remove('hidden');$('solBtn').classList.add('hidden');confetti();sv();updBar()}
function taskNo(){G.att++;const n=Date.now();if(n-G.lat<3000&&G.att>=3){showTO();return}G.lat=n;if(G.att>=2)$('solBtn').classList.remove('hidden')}
function showSol(){if(G.ans)return;G.ans=1;G.pts+=1;G.st[G.cs].p+=1;G.st[G.cs].mp+=3;if(solFn)solFn();$('nxBtn').classList.remove('hidden');$('solBtn').classList.add('hidden');sv();updBar()}
function nxTask(){G.st[G.cs].td++;G.ct++;sv();loadTask()}
function stComplete(){
  const s=G.cs,st=G.st[s];st.d=1;G.cf[s]=1;
  if(s<4)G.st[s+1].u=1;if(s===4)G.st[5].u=1;
  const inf=STN[s],pct=st.mp?Math.round(st.p/st.mp*100):0;
  $('tC').innerHTML=`<div class="cwr"><div style="font-size:3rem;">${inf.em} 🎉</div><h2 style="margin:12px 0;">Station ${inf.id} geschafft!</h2><p>${st.p} von ${st.mp} Punkten (${pct}%) ${getStars(st.p,st.mp)}</p><p style="margin-top:16px;font-size:1.1rem;">🔑 Codewort-Fragment freigeschaltet:</p><div class="frag">${CWF[s]}</div>${s<4?`<p style="margin-top:12px;">🔓 Station ${s+2} ist jetzt freigeschaltet!</p>`:''}</div>${allDone()?'<div style="text-align:center;margin-top:16px;"><button class="btn bs" onclick="showCert()" style="font-size:1.2rem;padding:16px 40px;">🌍 Reisepass ansehen!</button></div>':''}`;
  $('nxBtn').classList.add('hidden');$('mapBtn').classList.remove('hidden');sv();updBar();
}
function allDone(){for(let i=0;i<5;i++)if(!G.st[i].d)return 0;return 1}
function showCert(){
  let tp=0,tm=0;for(let i=0;i<5;i++){tp+=G.st[i].p;tm+=G.st[i].mp}const pct=tm?Math.round(tp/tm*100):0;
  let r,rt;if(pct>=90){r='⭐⭐⭐';rt='Sehr gut'}else if(pct>=75){r='⭐⭐';rt='Gut'}else if(pct>=60){r='⭐';rt='Befriedigend'}else{r='💪';rt='Weiter üben!'}
  $('certC').innerHTML=`<div style="font-size:3rem;">🌍🏆🎓</div><h2>Reisepass</h2><div style="font-size:1.4rem;font-weight:700;color:#6366F1;margin:16px 0;">${G.name||'Abenteurer'}</div><p>hat die große Mathe-Abenteuerreise<br>erfolgreich abgeschlossen!</p><div style="font-size:1.5rem;font-weight:900;letter-spacing:6px;color:#DC2626;margin:16px 0;">${CW}</div><p>Punkte: ${tp} / ${tm} (${pct}%)</p><div style="font-size:2rem;margin:12px 0;">${r}</div><div style="font-size:1.1rem;font-weight:600;">${rt}</div><p style="margin-top:16px;font-size:.8rem;color:var(--txL);">Zuordnungen – direkte und indirekte Proportionalität | Klasse 6</p>`;
  $('certScr').style.display='flex';showScr('certScr');
}
function showTO(){$('toOv').classList.remove('hidden');let s=120;const iv=setInterval(()=>{s--;$('toCD').textContent=`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;if(s<=0){clearInterval(iv);$('toOv').classList.add('hidden')}},1000)}

// === HELPERS: check inputs ===
function chkInps(prefix,fb){
  if(G.ans)return;let ok=1;
  document.querySelectorAll(`[id^="${prefix}"]`).forEach(inp=>{
    const v=pN(inp.value),a=pN(inp.dataset.a);
    if(aE(v,a)){inp.style.borderColor='#22C55E'}else{inp.style.borderColor='#EF4444';ok=0}
  });
  if(ok){$(fb).innerHTML=`<div class="fb s">${rs()}</div>`;taskOk()}
  else{$(fb).innerHTML=G.att===0?`<div class="fb e">Fast! 🤔 Versuch es nochmal!</div>`:
    `<div class="fb h">💡 Tipp: Schau dir die bekannten Wertepaare an und berechne den Zusammenhang.</div>`;taskNo()}
}
function chkMC(btn,ok){
  if(G.ans)return;document.querySelectorAll('.mb').forEach(b=>b.classList.add('dis'));
  if(ok){btn.classList.add('ok');$('fbk').innerHTML=`<div class="fb s">${rs()}</div>`;taskOk()}

// === SVG HELPERS ===
function mkSVG(w,h,xM,yM,xL,yL){
  const p={l:50,r:20,t:20,b:40},iw=w-p.l-p.r,ih=h-p.t-p.b;
  const sx=x=>p.l+(x/xM)*iw,sy=y=>p.t+ih-(y/yM)*ih;
  let s=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="background:#FAFAFA;border-radius:12px;">`;
  for(let i=0;i<=5;i++){const x=p.l+i*(iw/5);s+=`<line x1="${x}" y1="${p.t}" x2="${x}" y2="${p.t+ih}" stroke="#E2E8F0"/><text x="${x}" y="${h-8}" text-anchor="middle" fill="#94A3B8" font-size="11">${r2(xM/5*i)}</text>`}
  for(let i=0;i<=5;i++){const y=p.t+i*(ih/5);s+=`<line x1="${p.l}" y1="${y}" x2="${p.l+iw}" y2="${y}" stroke="#E2E8F0"/><text x="${p.l-8}" y="${y+4}" text-anchor="end" fill="#94A3B8" font-size="11">${r2(yM-yM/5*i)}</text>`}
  s+=`<line x1="${p.l}" y1="${p.t}" x2="${p.l}" y2="${p.t+ih}" stroke="#334155" stroke-width="2"/><line x1="${p.l}" y1="${p.t+ih}" x2="${p.l+iw}" y2="${p.t+ih}" stroke="#334155" stroke-width="2"/>`;
  s+=`<text x="${p.l+iw/2}" y="${h-2}" text-anchor="middle" fill="#334155" font-size="12" font-weight="600">${xL}</text>`;
  s+=`<text x="14" y="${p.t+ih/2}" text-anchor="middle" fill="#334155" font-size="12" font-weight="600" transform="rotate(-90,14,${p.t+ih/2})">${yL}</text>`;
  return{s,sx,sy,end:'</svg>',p,iw,ih};
}
function svgPts(o,pts,c){let s='';pts.forEach(p=>{s+=`<circle cx="${o.sx(p.x)}" cy="${o.sy(p.y)}" r="5" fill="${c}" stroke="#fff" stroke-width="2"/>`});return s}
function svgLine(o,pts,c){if(pts.length<2)return'';let d=`M ${o.sx(pts[0].x)} ${o.sy(pts[0].y)}`;for(let i=1;i<pts.length;i++)d+=` L ${o.sx(pts[i].x)} ${o.sy(pts[i].y)}`;return`<path d="${d}" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`}

// === RANDOM GENERATORS ===
const DK=[1.5,2,2.5,3,3.5,4,5,6,7.5,8,10,15];
const DX=[1,2,3,4,5,6,8,10,12,15,20];
const IK=[12,18,20,24,30,36,40,48,60,72,100,120,252,300];
function genDT(nPairs){
  nPairs=nPairs||5;const k=pk(DK);const pool=DX.filter(x=>{const y=k*x;return y<1000&&(y===Math.round(y)||Math.abs(y-r2(y))<0.001)});
  const xs=[];while(xs.length<nPairs&&pool.length>xs.length){const x=pk(pool);if(!xs.includes(x))xs.push(x)}
  xs.sort((a,b)=>a-b);return{k,pairs:xs.map(x=>({x,y:r2(k*x)}))}
}
function genIT(nPairs){
  nPairs=nPairs||5;const k=pk(IK);const divs=[];for(let i=1;i<=k&&i<=30;i++)if(k%i===0)divs.push(i);
  const xs=[];while(xs.length<nPairs&&divs.length>xs.length){const x=pk(divs);if(!xs.includes(x))xs.push(x)}
  xs.sort((a,b)=>a-b);return{k,pairs:xs.map(x=>({x,y:k/x}))}
}

  <div class="stepbox"><div class="steplabel">Schritt 4: Stunden pro Person</div><div class="row"><span>${left} ÷ ${rem} =</span><input class="ni" id="s5z_3" data-a="${hLeft}"><span>Stunden</span></div></div>
  <div style="text-align:center;margin-top:12px;"><button class="btn bst" style="background:var(--cur)" onclick="chkInps('s5z_','fbk')">Überprüfen ✓</button></div><div id="fbk"></div></div>`;
  solFn=()=>{$('s5z_0').value=total;$('s5z_1').value=done;$('s5z_2').value=left;$('s5z_3').value=hLeft;$('fbk').innerHTML=`<div class="sol">Gesamt: ${total}, geleistet: ${done}, Rest: ${left}, pro Person: <strong>${hLeft} h</strong></div>`};
}

function s5_meerschweinchen(){
  // ZA2: Meerschweinchen (like Zusatzaufgabe 2)
  const tage1=pk([8,10,12]);const ms1=pk([12,15,16,20]);const heu1=pk([8,10,12,15]);
  const heuProMsTag=r2(heu1/(ms1*tage1));
  const ms2=pk([15,18,20,24].filter(x=>x!==ms1));const tage2=pk([5,6,8].filter(x=>x!==tage1));
  const heu2=r2(heuProMsTag*ms2*tage2);

  $('tC').innerHTML=`<div class="tc"><div class="intro">🏖️ <strong>Dreifacher Dreisatz (Zusatzaufgabe):</strong></div>
  <div class="qbox">In <strong>${tage1} Tagen</strong> essen <strong>${ms1} Meerschweinchen</strong> <strong>${heu1} kg Heu</strong>. Wie viel Heu essen <strong>${ms2} Meerschweinchen</strong> in <strong>${tage2} Tagen</strong>?</div>
  <div class="stepbox"><div class="steplabel">Schritt 1: Heu pro Meerschweinchen pro Tag</div><div class="row"><span>${heu1} ÷ ${ms1} ÷ ${tage1} =</span><input class="ni" id="s5m_0" data-a="${heuProMsTag}"><span>kg</span></div></div>
  <div class="stepbox"><div class="steplabel">Schritt 2: Heu für ${ms2} Meerschweinchen in ${tage2} Tagen</div><div class="row"><input class="ni" id="s5m_1" data-a="${heu2}"><span>kg</span></div></div>
  <div style="text-align:center;margin-top:12px;"><button class="btn bst" style="background:var(--cur)" onclick="chkInps('s5m_','fbk')">Überprüfen ✓</button></div><div id="fbk"></div></div>`;
  solFn=()=>{$('s5m_0').value=heuProMsTag;$('s5m_1').value=heu2;$('fbk').innerHTML=`<div class="sol">Pro MS/Tag: ${heuProMsTag} kg. ${ms2}·${tage2}·${heuProMsTag}=<strong>${heu2} kg</strong></div>`};
}

function genBonus(t){
  const fns=[s2_dreisatzHard,s3_dreisatzHard,s5_sr1,s5_sr2,s5_sr3,s5_sr4];
  pk(fns)();G.st[5].tt=Math.max(G.st[5].tt,t+2);
}
